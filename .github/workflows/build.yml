name: Zephyr Firmware CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Application Code
        uses: actions/checkout@v4
        with:
          # Checks out your repository into a folder named "app"
          path: app

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      - name: Setup Zephyr environment
        uses: zephyrproject-rtos/action-zephyr-setup@v1
        with:
          # Points the action to your code
          app-path: app
          # Only downloads the specific compiler needed for the Cortex-M0+
          toolchains: arm-zephyr-eabi

      - name: Build Firmware
        run: |
          # The action automatically configures the environment, so we can just build
          west build app -b lp_mspm0g3507 -p always

      - name: Upload Firmware Artifact
        uses: actions/upload-artifact@v4
        with:
          name: audio-analyzer-firmware
          # Grabs the final binary generated by the previous step
          path: build/zephyr/zephyr.hex